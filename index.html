<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Labyrinth – Desktop · Mobile VR · AR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="info">
        🧩 Find the glowing hint → 🚪 Reach the golden exit
    </div>

    <!-- Mode selection -->
    <div id="mode-buttons">
        <button id="btn-desktop">🖱️ Desktop (WASD + mouse)</button>
        <button id="btn-mobile-vr">📱 Mobile VR (gyro + buttons)</button>
        <button id="btn-ar">🔘 AR (WebXR, experimental)</button>
    </div>

    <!-- Mobile VR on‑screen joystick (arrow buttons) -->
    <div id="mobile-controls" class="hidden">
        <div class="joystick">
            <button id="move-fwd">▲</button>
            <div class="mid-row">
                <button id="move-left">◀</button>
                <button id="move-back">▼</button>
                <button id="move-right">▶</button>
            </div>
        </div>
        <div id="orientation-status">🔄 Move your phone to look around</div>
    </div>

    <div id="hint-message" class="hidden">
        ✨ HINT: "The exit lies beyond the darkest corner" ✨
    </div>
    <div id="win-message" class="hidden">
        🎉 YOU ESCAPED! 🎉
    </div>
    <div id="error-message" class="hidden"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
